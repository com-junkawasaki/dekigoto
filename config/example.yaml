# ActorDB Configuration Example
version: "1.0"

# Cluster Configuration
cluster:
  name: "actordb-cluster"
  nodes:
    - "node1:8080"
    - "node2:8080"
    - "node3:8080"

# EventStore Configuration
eventstore:
  data_dir: "/data/actordb/events"
  snapshot_interval: 100000  # events
  retention_period: "720h" # 30d
  compression: "parquet"  # or "protobuf"
  max_concurrent_writes: 1000
  storage:
    type: "memory"  # memory, sqlite, postgresql, libsql, rocksdb, leveldb
    path: "/data/actordb/storage"
    # For production, use "verify-full" and configure certificates.
    # Secrets like passwords should be managed outside this file (e.g., via environment variables or a secret store).
    connection_string: "host=localhost port=5432 user=actordb dbname=actordb sslmode=verify-full"
    options:
      max_connections: 25

# Projection Engine Configuration
projection:
  worker_count: 8
  max_memory_mb: 4096
  auto_promote_qps_threshold: 2.0
  auto_demote_qps_threshold: 0.2
  late_window_ms: "60s" # 60000
  watermark_lag_ms: "2s" # 2000
  max_rebuild_time_sec: "30s" # 30

# Security Configuration
security:
  mtls_enabled: true
  jwt_issuer: "https://actordb.example.com"
  jwt_lifetime_sec: 300
  audit_stream_enabled: true
  spiffe_trust_domain: "example.org"

# Query Interface Configuration
query:
  listen_addr: ":9090"
  max_connections: 1000
  query_timeout_sec: "30s" # 30
  enable_sql_dialect: true

# Control Plane Configuration
control:
  listen_addr: ":8080"
  metrics_interval_sec: "10s" # 10
  scaling_check_interval_sec: "60s" # 60
  max_hot_key_rho: 0.7

# Monitoring
monitoring:
  prometheus_addr: ":9091"
  health_check_interval_sec: "30s" # 30

# Logging
logging:
  level: "info"
  format: "json"
  output: "stdout"
